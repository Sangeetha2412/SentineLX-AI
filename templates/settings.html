{% extends "base.html" %}
{% block title %}Settings{% endblock %}
{% block content %}
<div class="topbar">
  <div><div class="page-title">⚙️ Settings</div><div class="page-subtitle">Preferences for your account</div></div>
</div>
<div class="glass-panel" style="max-width:500px;">
  <form method="POST">
    <div class="form-group">
      <label class="form-label">Theme</label>
      <select name="theme" class="form-select">
        <option value="dark" {{ 'selected' if settings.theme == 'dark' }}>Dark (Cyberpunk)</option>
        <option value="dark" selected disabled>Light theme not available in this build</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-check"><input type="checkbox" name="email_notifications" {{ 'checked' if settings.email_notifications }}> Email notifications</label>
    </div>
    <button type="submit" class="btn btn-primary">Save Settings</button>
  </form>
</div>
{% endblock %}
