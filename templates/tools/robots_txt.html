{% extends "base.html" %}
{% block title %}Robots.txt Viewer{% endblock %}
{% block content %}
<div class="topbar">
  <div><div class="page-title">🤖 Robots.txt Viewer</div><div class="page-subtitle">Fetch and view a site's robots.txt directives.</div></div>
</div>
<div class="glass-panel">
  <form method="POST">
    <div class="form-group"><label class="form-label">Domain</label><input type="text" name="domain" class="form-input" placeholder="example.com" required></div>
    <button type="submit" class="btn btn-primary">Fetch robots.txt</button>
  </form>
  {% if result %}
    {% if result.success %}
    <div class="result-box"><pre style="white-space:pre-wrap; margin:0;">{{ result.content }}</pre></div>
    {% else %}
    <div class="result-box"><span style="color:var(--danger);">Error: {{ result.error }}</span></div>
    {% endif %}
  {% endif %}
</div>
{% endblock %}
