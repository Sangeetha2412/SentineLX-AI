{% extends "base.html" %}
{% block title %}File Hash Calculator{% endblock %}
{% block content %}
<div class="topbar">
  <div><div class="page-title">📁 File Hash Calculator</div><div class="page-subtitle">Compute a checksum for any uploaded file (max 10MB).</div></div>
</div>
<div class="glass-panel">
  <form method="POST" enctype="multipart/form-data">
    <div class="form-group"><label class="form-label">File</label><input type="file" name="file" class="form-input" required></div>
    <div class="form-group">
      <label class="form-label">Algorithm</label>
      <select name="algorithm" class="form-select">
        <option value="sha256" selected>SHA256</option>
        <option value="md5">MD5</option>
        <option value="sha1">SHA1</option>
        <option value="sha512">SHA512</option>
      </select>
    </div>
    <button type="submit" class="btn btn-primary">Calculate Hash</button>
  </form>
  {% if result %}
  <div class="result-box">
    <div class="result-row"><span class="result-key">File</span><span class="result-val">{{ result.filename }}</span></div>
    <div class="result-row"><span class="result-key">{{ result.algorithm|upper }}</span><span class="result-val">{{ result.hash }}</span></div>
  </div>
  {% endif %}
</div>
{% endblock %}
