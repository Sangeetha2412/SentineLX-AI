{% extends "base.html" %}
{% block title %}Password Generator{% endblock %}
{% block content %}
<div class="topbar">
  <div>
    <div class="page-title">🎲 Password Generator</div>
    <div class="page-subtitle">Cryptographically secure, generated with Python's `secrets` module.</div>
  </div>
</div>

<div class="glass-panel">
  <form method="POST">
    <div class="grid-2">
      <div class="form-group">
        <label class="form-label">Length</label>
        <input type="number" name="length" class="form-input" value="16" min="6" max="128">
      </div>
      <div class="form-group" style="display:flex; align-items:flex-end; gap:16px;">
        <label class="form-check"><input type="checkbox" name="use_upper" checked> Uppercase</label>
        <label class="form-check"><input type="checkbox" name="use_digits" checked> Digits</label>
        <label class="form-check"><input type="checkbox" name="use_symbols" checked> Symbols</label>
      </div>
    </div>
    <button type="submit" class="btn btn-primary">Generate Password</button>
  </form>

  {% if generated %}
  <div class="result-box flex items-center justify-between">
    <span id="generated-pwd" style="color:var(--cyan); font-size:16px;">{{ generated }}</span>
    <button class="btn btn-ghost" data-copy="#generated-pwd">Copy</button>
  </div>
  {% endif %}
</div>
{% endblock %}
