{% extends "base.html" %}
{% block title %}Sign In{% endblock %}
{% block guest_content %}
<div class="auth-wrapper">
  <div class="glass-panel auth-card">
    <div class="brand" style="justify-content:center; padding-bottom: 10px;"><span class="brand-dot"></span> SentinelX</div>
    <p class="text-muted" style="text-align:center; margin-bottom:22px; font-size:13px;">Sign in to your security dashboard</p>
    <form method="POST">
      <div class="form-group">
        <label class="form-label">Username or Email</label>
        <input type="text" name="username" class="form-input" required autofocus>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-input" required>
      </div>
      <button type="submit" class="btn btn-primary w-full">Sign In</button>
    </form>
    <p class="text-muted" style="text-align:center; margin-top:18px; font-size:13px;">
      Don't have an account? <a href="{{ url_for('auth.register') }}" style="color:var(--cyan);">Create one</a>
    </p>
  </div>
</div>
{% endblock %}
